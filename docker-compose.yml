services:
  framer-liquid-nav:
    image: framer-liquid-nav:latest
    container_name: framer-liquid-nav
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTPS route
      - "traefik.http.routers.framer-liquid-nav.rule=Host(`liquidnav.lightsitemedia.com`)"
      - "traefik.http.routers.framer-liquid-nav.entrypoints=websecure"
      - "traefik.http.routers.framer-liquid-nav.tls=true"
      - "traefik.http.routers.framer-liquid-nav.tls.certresolver=letsencrypt"
      - "traefik.http.services.framer-liquid-nav.loadbalancer.server.port=80"
      # HTTP redirect to HTTPS
      - "traefik.http.routers.framer-liquid-nav-http.rule=Host(`liquidnav.lightsitemedia.com`)"
      - "traefik.http.routers.framer-liquid-nav-http.entrypoints=web"
      - "traefik.http.routers.framer-liquid-nav-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

networks:
  dokploy-network:
    external: true
